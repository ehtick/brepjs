[package]
name = "brepjs-voxel-wasm"
version = "0.1.0"
edition = "2021"
description = "Voxel/SDF geometry engine for brepjs (Rust → WASM)"
license = "Apache-2.0"
repository = "https://github.com/andymai/brepjs"
# The npm package is published; the crate itself is not pushed to crates.io.
publish = false

[lib]
# cdylib: linked into the wasm-bindgen artifact. rlib: lets `cargo test` build a
# native harness so the FWN keystone assertions run without a wasm runtime.
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
# Surface Nets contourer over the dense SDF grid. ndshape is re-exported by
# fast-surface-nets, so we use that re-export to avoid a Shape-trait version skew.
fast-surface-nets = "0.2"

[dev-dependencies]
# default-features=false drops the plotters/html stack, keeping the dev build
# lean. Dev-deps never ship in the cdylib, so wasm size is unaffected.
criterion = { version = "0.5", default-features = false }

[[bench]]
name = "voxelize"
harness = false

[profile.release]
opt-level = "s"
lto = true
