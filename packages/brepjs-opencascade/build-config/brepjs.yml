  class TransformBatch {
  public:
    void addTranslate(const TopoDS_Shape& shape, double x, double y, double z) {
      Entry e;
      e.shape = shape;
      e.type = TRANSLATE;
      e.params[0] = x; e.params[1] = y; e.params[2] = z;
      entries_.push_back(e);
    }

    void addRotate(const TopoDS_Shape& shape, double angle,
                   double axX, double axY, double axZ,
                   double cX, double cY, double cZ) {
      Entry e;
      e.shape = shape;
      e.type = ROTATE;
      e.params[0] = angle;
      e.params[1] = axX; e.params[2] = axY; e.params[3] = axZ;
      e.params[4] = cX;  e.params[5] = cY;  e.params[6] = cZ;
      entries_.push_back(e);
    }

    void addScale(const TopoDS_Shape& shape, double cX, double cY, double cZ, double factor) {
      Entry e;
      e.shape = shape;
      e.type = SCALE;
      e.params[0] = cX; e.params[1] = cY; e.params[2] = cZ;
      e.params[3] = factor;
      entries_.push_back(e);
    }

    void addMirror(const TopoDS_Shape& shape,
                   double oX, double oY, double oZ,
                   double nX, double nY, double nZ) {
      Entry e;
      e.shape = shape;
      e.type = MIRROR;
      e.params[0] = oX; e.params[1] = oY; e.params[2] = oZ;
      e.params[3] = nX; e.params[4] = nY; e.params[5] = nZ;
      entries_.push_back(e);
    }

    void clear() { entries_.clear(); }
    int count() const { return static_cast<int>(entries_.size()); }

    TransformBatchResult execute() {
      TransformBatchResult result;
      result.shapesCount_ = static_cast<int>(entries_.size());
      if (result.shapesCount_ == 0) return result;

      result.shapesPtr_ = new TopoDS_Shape[result.shapesCount_];

      for (int i = 0; i < result.shapesCount_; i++) {
        const Entry& e = entries_[i];
        gp_Trsf trsf;

        switch (e.type) {
          case TRANSLATE: {
            gp_Vec vec(e.params[0], e.params[1], e.params[2]);
            trsf.SetTranslation(vec);
            break;
          }
          case ROTATE: {
            gp_Pnt center(e.params[4], e.params[5], e.params[6]);
            gp_Dir dir(e.params[1], e.params[2], e.params[3]);
            gp_Ax1 ax(center, dir);
            trsf.SetRotation(ax, e.params[0]);
            break;
          }
          case SCALE: {
            gp_Pnt center(e.params[0], e.params[1], e.params[2]);
            trsf.SetScale(center, e.params[3]);
            break;
          }
          case MIRROR: {
            gp_Pnt origin(e.params[0], e.params[1], e.params[2]);
            gp_Dir normal(e.params[3], e.params[4], e.params[5]);
            gp_Ax2 plane(origin, normal);
            trsf.SetMirror(plane);
            break;
          }
        }

        BRepBuilderAPI_Transform transformer(e.shape, trsf, Standard_True);
        result.shapesPtr_[i] = transformer.ModifiedShape(e.shape);
      }

      return result;
    }

  private:
    enum TransformType { TRANSLATE, ROTATE, SCALE, MIRROR };
    struct Entry {
      TopoDS_Shape shape;
      TransformType type;
      double params[7];
    };
    std::vector<Entry> entries_;
  };

  class ShapeBatchResult {
  public:
    ShapeBatchResult() : shapesPtr_(nullptr), shapesCount_(0) {}
    ~ShapeBatchResult() {
      delete[] shapesPtr_;
    }
    ShapeBatchResult(const ShapeBatchResult& other)
      : shapesPtr_(other.shapesPtr_), shapesCount_(other.shapesCount_) {
      auto& mutable_other = const_cast<ShapeBatchResult&>(other);
      mutable_other.shapesPtr_ = nullptr;
    }
    int getShapesCount() const { return shapesCount_; }
    TopoDS_Shape getShape(int index) const {
      if (index < 0 || index >= shapesCount_ || !shapesPtr_) return TopoDS_Shape();
      return shapesPtr_[index];
    }
  private:
    TopoDS_Shape* shapesPtr_;
    int shapesCount_;
    friend class LoftBatch;
    friend class ExtrudeBatch;
    friend class ShellBatch;
    friend class FilletBatch;
  };

  class LoftBatch {
  public:
    int beginLoft(bool solid, bool ruled, double tolerance) {
      entries_.push_back({solid, ruled, tolerance, {}, TopoDS_Shape(), TopoDS_Shape(), false, false});
      return static_cast<int>(entries_.size()) - 1;
    }
    void addWire(int entryIndex, const TopoDS_Shape& wire) {
      if (entryIndex >= 0 && entryIndex < static_cast<int>(entries_.size())) {
        entries_[entryIndex].wires.push_back(wire);
      }
    }
    void setStartVertex(int entryIndex, const TopoDS_Shape& vertex) {
      if (entryIndex >= 0 && entryIndex < static_cast<int>(entries_.size())) {
        entries_[entryIndex].startVertex = vertex;
        entries_[entryIndex].hasStart = true;
      }
    }
    void setEndVertex(int entryIndex, const TopoDS_Shape& vertex) {
      if (entryIndex >= 0 && entryIndex < static_cast<int>(entries_.size())) {
        entries_[entryIndex].endVertex = vertex;
        entries_[entryIndex].hasEnd = true;
      }
    }
    void clear() { entries_.clear(); }
    int count() const { return static_cast<int>(entries_.size()); }
    ShapeBatchResult execute() {
      ShapeBatchResult result;
      result.shapesCount_ = static_cast<int>(entries_.size());
      if (result.shapesCount_ == 0) return result;
      result.shapesPtr_ = new TopoDS_Shape[result.shapesCount_];
      for (int i = 0; i < result.shapesCount_; i++) {
        const Entry& e = entries_[i];
        BRepOffsetAPI_ThruSections builder(e.solid, e.ruled, e.tolerance);
        if (e.hasStart) { builder.AddVertex(TopoDS::Vertex(e.startVertex)); }
        for (const auto& wire : e.wires) { builder.AddWire(TopoDS::Wire(wire)); }
        if (e.hasEnd) { builder.AddVertex(TopoDS::Vertex(e.endVertex)); }
        Message_ProgressRange progress;
        builder.Build(progress);
        result.shapesPtr_[i] = builder.IsDone() ? builder.Shape() : TopoDS_Shape();
      }
      return result;
    }
  private:
    struct Entry {
      bool solid; bool ruled; double tolerance;
      std::vector<TopoDS_Shape> wires;
      TopoDS_Shape startVertex; TopoDS_Shape endVertex;
      bool hasStart; bool hasEnd;
    };
    std::vector<Entry> entries_;
  };

  class ExtrudeBatch {
  public:
    void addExtrude(const TopoDS_Shape& face, double dx, double dy, double dz) {
      entries_.push_back({face, dx, dy, dz});
    }
    void clear() { entries_.clear(); }
    int count() const { return static_cast<int>(entries_.size()); }
    ShapeBatchResult execute() {
      ShapeBatchResult result;
      result.shapesCount_ = static_cast<int>(entries_.size());
      if (result.shapesCount_ == 0) return result;
      result.shapesPtr_ = new TopoDS_Shape[result.shapesCount_];
      for (int i = 0; i < result.shapesCount_; i++) {
        const Entry& e = entries_[i];
        gp_Vec vec(e.dx, e.dy, e.dz);
        BRepPrimAPI_MakePrism maker(e.face, vec, Standard_False, Standard_True);
        result.shapesPtr_[i] = maker.IsDone() ? maker.Shape() : TopoDS_Shape();
      }
      return result;
    }
  private:
    struct Entry { TopoDS_Shape face; double dx, dy, dz; };
    std::vector<Entry> entries_;
  };

  class ShellBatch {
  public:
    int beginShell(const TopoDS_Shape& shape, double thickness, double tolerance) {
      entries_.push_back({shape, {}, thickness, tolerance});
      return static_cast<int>(entries_.size()) - 1;
    }
    void addFaceToRemove(int entryIndex, const TopoDS_Shape& face) {
      if (entryIndex >= 0 && entryIndex < static_cast<int>(entries_.size())) {
        entries_[entryIndex].facesToRemove.push_back(face);
      }
    }
    void clear() { entries_.clear(); }
    int count() const { return static_cast<int>(entries_.size()); }
    ShapeBatchResult execute() {
      ShapeBatchResult result;
      result.shapesCount_ = static_cast<int>(entries_.size());
      if (result.shapesCount_ == 0) return result;
      result.shapesPtr_ = new TopoDS_Shape[result.shapesCount_];
      for (int i = 0; i < result.shapesCount_; i++) {
        const Entry& e = entries_[i];
        TopTools_ListOfShape facesToRemove;
        for (const auto& face : e.facesToRemove) { facesToRemove.Append(face); }
        Message_ProgressRange progress;
        BRepOffsetAPI_MakeThickSolid builder;
        builder.MakeThickSolidByJoin(e.shape, facesToRemove, -e.thickness, e.tolerance,
          BRepOffset_Skin, Standard_False, Standard_False, GeomAbs_Arc, Standard_False, progress);
        result.shapesPtr_[i] = builder.IsDone() ? builder.Shape() : TopoDS_Shape();
      }
      return result;
    }
  private:
    struct Entry {
      TopoDS_Shape shape; std::vector<TopoDS_Shape> facesToRemove;
      double thickness; double tolerance;
    };
    std::vector<Entry> entries_;
  };

  class FilletBatch {
  public:
    int beginFillet(const TopoDS_Shape& shape) {
      entries_.push_back({shape, {}});
      return static_cast<int>(entries_.size()) - 1;
    }
    void addEdge(int entryIndex, const TopoDS_Shape& shape, double radius) {
      if (entryIndex >= 0 && entryIndex < static_cast<int>(entries_.size())) {
        TopoDS_Edge edge = TopoDS::Edge(shape);
        entries_[entryIndex].edges.push_back({edge, radius, radius, false});
      }
    }
    void addEdgeVariable(int entryIndex, const TopoDS_Shape& shape, double r1, double r2) {
      if (entryIndex >= 0 && entryIndex < static_cast<int>(entries_.size())) {
        TopoDS_Edge edge = TopoDS::Edge(shape);
        entries_[entryIndex].edges.push_back({edge, r1, r2, true});
      }
    }
    void clear() { entries_.clear(); }
    int count() const { return static_cast<int>(entries_.size()); }
    ShapeBatchResult execute() {
      ShapeBatchResult result;
      result.shapesCount_ = static_cast<int>(entries_.size());
      if (result.shapesCount_ == 0) return result;
      result.shapesPtr_ = new TopoDS_Shape[result.shapesCount_];
      for (int i = 0; i < result.shapesCount_; i++) {
        const Entry& e = entries_[i];
        BRepFilletAPI_MakeFillet builder(e.shape, ChFi3d_Rational);
        for (const auto& edgeInfo : e.edges) {
          if (edgeInfo.variable) { builder.Add(edgeInfo.r1, edgeInfo.r2, edgeInfo.edge); }
          else { builder.Add(edgeInfo.r1, edgeInfo.edge); }
        }
        Message_ProgressRange progress;
        builder.Build(progress);
        result.shapesPtr_[i] = builder.IsDone() ? builder.Shape() : TopoDS_Shape();
      }
      return result;
    }
  private:
    struct EdgeInfo { TopoDS_Edge edge; double r1; double r2; bool variable; };
    struct Entry { TopoDS_Shape shape; std::vector<EdgeInfo> edges; };
    std::vector<Entry> entries_;
  };

