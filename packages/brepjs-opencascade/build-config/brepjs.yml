  class MeasurementExtractor {
  public:
    static MeasurementData extract(const TopoDS_Shape& shape, bool includeLinear) {
      MeasurementData result;
      result.dataSize_ = 12;
      result.dataPtr_ = static_cast<double*>(std::malloc(12 * sizeof(double)));
      if (!result.dataPtr_) throw std::bad_alloc();

      GProp_GProps volProps;
      BRepGProp::VolumeProperties(shape, volProps, Standard_True, Standard_False, Standard_False);
      result.dataPtr_[0] = volProps.Mass();

      GProp_GProps surfProps;
      BRepGProp::SurfaceProperties(shape, surfProps, 1e-7, Standard_True);
      result.dataPtr_[1] = surfProps.Mass();

      if (includeLinear) {
        GProp_GProps linProps;
        BRepGProp::LinearProperties(shape, linProps, Standard_True, Standard_False);
        result.dataPtr_[2] = linProps.Mass();
      } else {
        result.dataPtr_[2] = 0.0;
      }

      gp_Pnt center = volProps.CentreOfMass();
      result.dataPtr_[3] = center.X();
      result.dataPtr_[4] = center.Y();
      result.dataPtr_[5] = center.Z();

      Bnd_Box box;
      BRepBndLib::Add(shape, box, Standard_True);
      if (!box.IsVoid()) {
        double xMin, yMin, zMin, xMax, yMax, zMax;
        box.Get(xMin, yMin, zMin, xMax, yMax, zMax);
        result.dataPtr_[6] = xMin;
        result.dataPtr_[7] = yMin;
        result.dataPtr_[8] = zMin;
        result.dataPtr_[9] = xMax;
        result.dataPtr_[10] = yMax;
        result.dataPtr_[11] = zMax;
      } else {
        for (int k = 6; k < 12; k++) result.dataPtr_[k] = 0.0;
      }

      return result;
    }
  };

