  class EdgeMeshExtractor {
  public:
    static EdgeMeshData extract(
      const TopoDS_Shape& shape,
      double tolerance,
      double angularTolerance
    ) {
      BRepMesh_IncrementalMesh mesher(shape, tolerance, Standard_False, angularTolerance, Standard_False);

      NCollection_Map<TopoDS_Shape, TopTools_ShapeMapHasher> seenEdges;

      // --- Pass 1: count segments and edges ---
      int totalSegments = 0;
      int totalEdges = 0;

      // Pass 1a: edges from face triangulations
      for (TopExp_Explorer faceEx(shape, TopAbs_FACE); faceEx.More(); faceEx.Next()) {
        const TopoDS_Face& face = TopoDS::Face(faceEx.Current());
        TopLoc_Location faceLoc;
        Handle(Poly_Triangulation) tri = BRep_Tool::Triangulation(face, faceLoc);
        if (tri.IsNull()) continue;

        for (TopExp_Explorer edgeEx(face, TopAbs_EDGE); edgeEx.More(); edgeEx.Next()) {
          const TopoDS_Edge& edge = TopoDS::Edge(edgeEx.Current());
          if (seenEdges.Contains(edge)) continue;
          seenEdges.Add(edge);

          TopLoc_Location edgeLoc;
          Handle(Poly_PolygonOnTriangulation) polygon =
            BRep_Tool::PolygonOnTriangulation(edge, tri, edgeLoc);
          if (polygon.IsNull()) continue;

          int nNodes = polygon->Nodes().Length();
          if (nNodes < 2) continue;
          totalSegments += (nNodes - 1);
          totalEdges++;
        }
      }

      // Pass 1b: remaining edges via curve tessellation (count only)
      // We need to store the tessellation results since GCPnts_TangentialDeflection is expensive.
      // Use a small helper struct to cache the results.
      struct CurveTessInfo {
        TopoDS_Edge edge;
        int nbPts;
      };
      std::vector<CurveTessInfo> curveEdges;

      for (TopExp_Explorer edgeEx(shape, TopAbs_EDGE); edgeEx.More(); edgeEx.Next()) {
        const TopoDS_Edge& edge = TopoDS::Edge(edgeEx.Current());
        if (seenEdges.Contains(edge)) continue;
        seenEdges.Add(edge);

        BRepAdaptor_Curve adaptor(edge);
        GCPnts_TangentialDeflection tangDef(adaptor, tolerance, angularTolerance, 2, 1e-9, 1e-7);
        int nbPts = tangDef.NbPoints();
        if (nbPts < 2) continue;

        totalSegments += (nbPts - 1);
        totalEdges++;
        curveEdges.push_back({edge, nbPts});
      }

      // --- Allocate exact-size buffers ---
      EdgeMeshData result;

      // Each segment = 2 endpoints × 3 floats = 6 floats
      result.linesSize_ = totalSegments * 6;
      if (result.linesSize_ > 0) {
        result.linesPtr_ = static_cast<float*>(std::malloc(result.linesSize_ * sizeof(float)));
        if (!result.linesPtr_) throw std::bad_alloc();
      }

      // Each edge group = [start, count, hash] = 3 int32s
      result.edgeGroupsSize_ = totalEdges * 3;
      if (result.edgeGroupsSize_ > 0) {
        result.edgeGroupsPtr_ = static_cast<int32_t*>(std::malloc(result.edgeGroupsSize_ * sizeof(int32_t)));
        if (!result.edgeGroupsPtr_) throw std::bad_alloc();
      }

      // --- Pass 2: fill buffers ---
      int lineOffset = 0;
      int groupOffset = 0;
      seenEdges.Clear();

      // Pass 2a: edges from face triangulations
      for (TopExp_Explorer faceEx(shape, TopAbs_FACE); faceEx.More(); faceEx.Next()) {
        const TopoDS_Face& face = TopoDS::Face(faceEx.Current());
        TopLoc_Location faceLoc;
        Handle(Poly_Triangulation) tri = BRep_Tool::Triangulation(face, faceLoc);
        if (tri.IsNull()) continue;

        for (TopExp_Explorer edgeEx(face, TopAbs_EDGE); edgeEx.More(); edgeEx.Next()) {
          const TopoDS_Edge& edge = TopoDS::Edge(edgeEx.Current());
          if (seenEdges.Contains(edge)) continue;
          seenEdges.Add(edge);

          TopLoc_Location edgeLoc;
          Handle(Poly_PolygonOnTriangulation) polygon =
            BRep_Tool::PolygonOnTriangulation(edge, tri, edgeLoc);
          if (polygon.IsNull()) continue;

          const TColStd_Array1OfInteger& nodes = polygon->Nodes();
          if (nodes.Length() < 2) continue;

          int lineStart = lineOffset / 3;
          int pointCount = 0;
          const gp_Trsf& trsf = edgeLoc.Transformation();

          gp_Pnt prevPt;
          bool hasPrev = false;

          for (int i = nodes.Lower(); i <= nodes.Upper(); i++) {
            gp_Pnt p = tri->Node(nodes.Value(i)).Transformed(trsf);
            if (hasPrev) {
              result.linesPtr_[lineOffset++] = static_cast<float>(prevPt.X());
              result.linesPtr_[lineOffset++] = static_cast<float>(prevPt.Y());
              result.linesPtr_[lineOffset++] = static_cast<float>(prevPt.Z());
              result.linesPtr_[lineOffset++] = static_cast<float>(p.X());
              result.linesPtr_[lineOffset++] = static_cast<float>(p.Y());
              result.linesPtr_[lineOffset++] = static_cast<float>(p.Z());
              pointCount += 2;
            }
            prevPt = p;
            hasPrev = true;
          }

          result.edgeGroupsPtr_[groupOffset++] = lineStart;
          result.edgeGroupsPtr_[groupOffset++] = pointCount;
          result.edgeGroupsPtr_[groupOffset++] = static_cast<int>(TopTools_ShapeMapHasher{}(edge) % 2147483647);
        }
      }

      // Pass 2b: remaining edges via curve tessellation
      for (const auto& info : curveEdges) {
        BRepAdaptor_Curve adaptor(info.edge);
        GCPnts_TangentialDeflection tangDef(adaptor, tolerance, angularTolerance, 2, 1e-9, 1e-7);

        int lineStart = lineOffset / 3;
        int pointCount = 0;

        gp_Pnt prevPt;
        bool hasPrev = false;

        for (int j = 1; j <= info.nbPts; j++) {
          gp_Pnt p = tangDef.Value(j);
          if (hasPrev) {
            result.linesPtr_[lineOffset++] = static_cast<float>(prevPt.X());
            result.linesPtr_[lineOffset++] = static_cast<float>(prevPt.Y());
            result.linesPtr_[lineOffset++] = static_cast<float>(prevPt.Z());
            result.linesPtr_[lineOffset++] = static_cast<float>(p.X());
            result.linesPtr_[lineOffset++] = static_cast<float>(p.Y());
            result.linesPtr_[lineOffset++] = static_cast<float>(p.Z());
            pointCount += 2;
          }
          prevPt = p;
          hasPrev = true;
        }

        result.edgeGroupsPtr_[groupOffset++] = lineStart;
        result.edgeGroupsPtr_[groupOffset++] = pointCount;
        result.edgeGroupsPtr_[groupOffset++] = static_cast<int>(TopTools_ShapeMapHasher{}(info.edge) % 2147483647);
      }

      return result;
    }
  };

  class EvolutionData {
  public:
    EvolutionData()
      : modifiedPtr_(nullptr), generatedPtr_(nullptr), deletedPtr_(nullptr),
        modifiedSize_(0), generatedSize_(0), deletedSize_(0) {}

    ~EvolutionData() {
      std::free(modifiedPtr_);
      std::free(generatedPtr_);
      std::free(deletedPtr_);
    }

    EvolutionData(const EvolutionData& other)
      : modifiedPtr_(other.modifiedPtr_), generatedPtr_(other.generatedPtr_),
        deletedPtr_(other.deletedPtr_),
        modifiedSize_(other.modifiedSize_), generatedSize_(other.generatedSize_),
        deletedSize_(other.deletedSize_) {
      auto& mutable_other = const_cast<EvolutionData&>(other);
      mutable_other.modifiedPtr_ = nullptr;
      mutable_other.generatedPtr_ = nullptr;
      mutable_other.deletedPtr_ = nullptr;
    }

    int getModifiedPtr() const  { return static_cast<int>(reinterpret_cast<uintptr_t>(modifiedPtr_)); }
    int getGeneratedPtr() const { return static_cast<int>(reinterpret_cast<uintptr_t>(generatedPtr_)); }
    int getDeletedPtr() const   { return static_cast<int>(reinterpret_cast<uintptr_t>(deletedPtr_)); }

    int getModifiedSize() const  { return modifiedSize_; }
    int getGeneratedSize() const { return generatedSize_; }
    int getDeletedSize() const   { return deletedSize_; }

  private:
    int32_t* modifiedPtr_;
    int32_t* generatedPtr_;
    int32_t* deletedPtr_;

    int modifiedSize_;
    int generatedSize_;
    int deletedSize_;

    friend class EvolutionExtractor;
  };

  class EvolutionExtractor {
  public:
    static EvolutionData extract(
      BRepBuilderAPI_MakeShape& builder,
      const TopoDS_Shape& inputShape,
      int hashUpperBound
    ) {
      // Collect input faces and their hashes
      NCollection_DataMap<int, TopoDS_Shape> facesByHash;
      for (TopExp_Explorer ex(inputShape, TopAbs_FACE); ex.More(); ex.Next()) {
        const TopoDS_Face& face = TopoDS::Face(ex.Current());
        int hash = static_cast<int>(TopTools_ShapeMapHasher{}(face) % hashUpperBound);
        if (!facesByHash.IsBound(hash)) {
          facesByHash.Bind(hash, face);
        }
      }

      // Temporary buffers for packed data
      std::vector<int32_t> modifiedBuf;
      std::vector<int32_t> generatedBuf;
      std::vector<int32_t> deletedBuf;

      for (NCollection_DataMap<int, TopoDS_Shape>::Iterator it(facesByHash); it.More(); it.Next()) {
        int inputHash = it.Key();
        const TopoDS_Shape& face = it.Value();

        if (builder.IsDeleted(face)) {
          deletedBuf.push_back(inputHash);
          continue;
        }

        const TopTools_ListOfShape& modList = builder.Modified(face);
        if (modList.Size() > 0) {
          modifiedBuf.push_back(inputHash);
          modifiedBuf.push_back(modList.Size());
          for (TopTools_ListIteratorOfListOfShape lit(modList); lit.More(); lit.Next()) {
            modifiedBuf.push_back(static_cast<int>(TopTools_ShapeMapHasher{}(lit.Value()) % hashUpperBound));
          }
        }

        const TopTools_ListOfShape& genList = builder.Generated(face);
        if (genList.Size() > 0) {
          generatedBuf.push_back(inputHash);
          generatedBuf.push_back(genList.Size());
          for (TopTools_ListIteratorOfListOfShape lit(genList); lit.More(); lit.Next()) {
            generatedBuf.push_back(static_cast<int>(TopTools_ShapeMapHasher{}(lit.Value()) % hashUpperBound));
          }
        }
      }

      // Pack into EvolutionData
      EvolutionData result;

      result.modifiedSize_ = static_cast<int>(modifiedBuf.size());
      if (result.modifiedSize_ > 0) {
        result.modifiedPtr_ = static_cast<int32_t*>(std::malloc(result.modifiedSize_ * sizeof(int32_t)));
        if (!result.modifiedPtr_) throw std::bad_alloc();
        std::memcpy(result.modifiedPtr_, modifiedBuf.data(), result.modifiedSize_ * sizeof(int32_t));
      }

      result.generatedSize_ = static_cast<int>(generatedBuf.size());
      if (result.generatedSize_ > 0) {
        result.generatedPtr_ = static_cast<int32_t*>(std::malloc(result.generatedSize_ * sizeof(int32_t)));
        if (!result.generatedPtr_) throw std::bad_alloc();
        std::memcpy(result.generatedPtr_, generatedBuf.data(), result.generatedSize_ * sizeof(int32_t));
      }

      result.deletedSize_ = static_cast<int>(deletedBuf.size());
      if (result.deletedSize_ > 0) {
        result.deletedPtr_ = static_cast<int32_t*>(std::malloc(result.deletedSize_ * sizeof(int32_t)));
        if (!result.deletedPtr_) throw std::bad_alloc();
        std::memcpy(result.deletedPtr_, deletedBuf.data(), result.deletedSize_ * sizeof(int32_t));
      }

      return result;
    }
  };

  class TopologyResult {
  public:
    TopologyResult() : shapesPtr_(nullptr), shapesCount_(0) {}

    ~TopologyResult() {
      delete[] shapesPtr_;
    }

    TopologyResult(const TopologyResult& other)
      : shapesPtr_(other.shapesPtr_), shapesCount_(other.shapesCount_) {
      auto& mutable_other = const_cast<TopologyResult&>(other);
      mutable_other.shapesPtr_ = nullptr;
    }

    int getShapesCount() const { return shapesCount_; }
    TopoDS_Shape getShape(int index) const {
      if (index < 0 || index >= shapesCount_ || !shapesPtr_) return TopoDS_Shape();
      return shapesPtr_[index];
    }

