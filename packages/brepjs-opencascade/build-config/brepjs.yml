    MeasurementData(const MeasurementData& other)
      : dataPtr_(other.dataPtr_), dataSize_(other.dataSize_) {
      auto& mutable_other = const_cast<MeasurementData&>(other);
      mutable_other.dataPtr_ = nullptr;
    }

    int getDataPtr() const { return static_cast<int>(reinterpret_cast<uintptr_t>(dataPtr_)); }
    int getDataSize() const { return dataSize_; }

