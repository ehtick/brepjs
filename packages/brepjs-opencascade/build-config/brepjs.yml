  // KDTree spatial index for 3D points — wraps NCollection_KDTree<gp_XYZ, 3>
  class SpatialIndex3D {
  public:
    SpatialIndex3D() : built_(false) {}

    void addPoint(double x, double y, double z) {
      points_.push_back(gp_XYZ(x, y, z));
    }

    void build() {
      if (points_.empty()) return;
      tree_.Build(points_.data(), points_.size());
      built_ = true;
    }

    // Returns 1-based index of nearest point, or 0 if tree is empty
    int nearestPoint(double x, double y, double z) {
      if (!built_ || points_.empty()) return 0;
      gp_XYZ query(x, y, z);
      NCollection_Array1<size_t> indices(1, 1);
      NCollection_Array1<double> dists(1, 1);
      size_t found = tree_.KNearestPoints(query, 1, indices, dists);
      if (found == 0) return 0;
      return static_cast<int>(indices.Value(1)); // 1-based
    }

    // Returns count + fills outPtr with 1-based indices of points within radius
    int pointsInRadius(double x, double y, double z, double radius,
                       int* outPtr, int maxResults) {
      if (!built_) return 0;
      gp_XYZ query(x, y, z);
      auto results = tree_.RangeSearch(query, radius);
      int count = std::min(static_cast<int>(results.Size()), maxResults);
      for (int i = 0; i < count; i++) {
        outPtr[i] = static_cast<int>(results[static_cast<size_t>(i)]);
      }
      return count;
    }

    int size() const { return static_cast<int>(points_.size()); }

  private:
    std::vector<gp_XYZ> points_;
    NCollection_KDTree<gp_XYZ, 3> tree_;
    bool built_;
  };

