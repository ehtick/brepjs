  // Stream-based STEP I/O — bypasses Emscripten FS entirely
  class StepStreamIO {
  public:
    static std::string exportSTEP(const TopoDS_Shape& shape, int schema) {
      STEPControl_Writer writer;
      Interface_Static::SetIVal("write.step.schema", schema);
      writer.Model(Standard_True);
      Message_ProgressRange progress;
      writer.Transfer(shape, STEPControl_AsIs, Standard_True, progress);
      std::ostringstream oss;
      writer.WriteStream(oss);
      return oss.str();
    }

    static TopoDS_Shape importSTEP(const std::string& data) {
      std::istringstream iss(data);
      STEPControl_Reader reader;
      if (reader.ReadStream("memory.step", iss) != IFSelect_RetDone) {
        return TopoDS_Shape();
      }
      Message_ProgressRange progress;
      reader.TransferRoots(progress);
      return reader.OneShape();
    }
  };

  // Batch 2D curve evaluation — single WASM call for N parameters
  class Curve2dBatchEval {
  public:
    // Returns flat array: [x0, y0, x1, y1, ...] for each parameter
    static int evaluate(const Handle_Geom2d_Curve& curve,
                        const double* params, int paramCount,
                        double* outPtr) {
      for (int i = 0; i < paramCount; i++) {
        gp_Pnt2d p;
        curve->D0(params[i], p);
        outPtr[i * 2] = p.X();
        outPtr[i * 2 + 1] = p.Y();
      }
      return paramCount;
    }

    // Returns flat array: [px0, py0, tx0, ty0, ...] for each parameter
    static int evaluateD1(const Handle_Geom2d_Curve& curve,
                          const double* params, int paramCount,
                          double* outPtr) {
      for (int i = 0; i < paramCount; i++) {
        gp_Pnt2d p;
        gp_Vec2d v;
        curve->D1(params[i], p, v);
        outPtr[i * 4] = p.X();
        outPtr[i * 4 + 1] = p.Y();
        outPtr[i * 4 + 2] = v.X();
        outPtr[i * 4 + 3] = v.Y();
      }
      return paramCount;
    }
  };

