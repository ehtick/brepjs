name: Playground Smoke

# Runs after Vercel finishes a deployment. Loads the deployed playground in
# headless Chromium and verifies the WASM kernel reaches `Ready` within 60s
# — gates against CSP / COEP / COOP / asset-path regressions that block
# engine init but pass static build checks.

on:
  deployment_status:

concurrency:
  group: playground-smoke-${{ github.event.deployment.sha }}-${{ github.event.deployment.environment }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  smoke:
    # Only run on successful Vercel deployments. Vercel populates
    # `creator.login` with `vercel[bot]`; the environment is "Preview" or
    # "Production".
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.creator.login == 'vercel[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.deployment.sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Cache puppeteer browser download
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json', 'apps/playground/package.json') }}

      - name: Install playground dependencies
        working-directory: apps/playground
        # --ignore-scripts skips the root `prepare` (husky + ensure-wasm)
        # which we don't need in a smoke runner. We then run puppeteer's
        # browser install explicitly below since --ignore-scripts also
        # suppressed it.
        run: npm install --legacy-peer-deps --no-audit --no-fund --ignore-scripts

      - name: Install Chrome for Puppeteer
        working-directory: apps/playground
        run: npx puppeteer browsers install chrome

      - name: Run smoke against deployment
        working-directory: apps/playground
        env:
          DEPLOY_URL: ${{ github.event.deployment_status.target_url || github.event.deployment_status.environment_url }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "::error::No deployment URL on the event payload"
            exit 1
          fi
          echo "Smoking $DEPLOY_URL"
          npm run smoke -- "$DEPLOY_URL"
