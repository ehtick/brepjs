name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      republish:
        description: 'Republish current main package.json version (skip release-please, run publish-brepjs only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Serialize release runs on main. Without this, rapid back-to-back merges (or a
# dependency-bump release loop) spawn concurrent runs that race on the shared
# `autorelease:*` labels — one run removes a label another expects, failing with
# "Label does not exist", which skips the gated publish jobs. Queue, never
# cancel: cancelling mid-publish would leave a tagged-but-unpublished release.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name == 'push'
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      brepjs_release_created: ${{ steps.release.outputs.release_created }}
      brepjs_opencascade_release_created: ${{ steps.release.outputs['packages/brepjs-opencascade--release_created'] }}
      brepjs_verify_release_created: ${{ steps.release.outputs['packages/brepjs-verify--release_created'] }}
      brepjs_verify_tag_name: ${{ steps.release.outputs['packages/brepjs-verify--tag_name'] }}
      brepjs_bim_release_created: ${{ steps.release.outputs['packages/brepjs-bim--release_created'] }}
      brepjs_bim_tag_name: ${{ steps.release.outputs['packages/brepjs-bim--tag_name'] }}
      brepjs_sheetmetal_release_created: ${{ steps.release.outputs['packages/brepjs-sheetmetal--release_created'] }}
      brepjs_sheetmetal_tag_name: ${{ steps.release.outputs['packages/brepjs-sheetmetal--tag_name'] }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
      prs: ${{ steps.release.outputs.prs }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Auto-merge ONLY the root brepjs release PR. brepjs-opencascade (expensive
  # WASM build) and brepjs-verify / brepjs-viewer are held for manual merge:
  # auto-merging their release-please dependency-bump PRs creates a runaway
  # release loop across the cross-linked workspace packages (the node-workspace
  # plugin re-emits a bump release on every linked release). Auto-PUBLISH still
  # works — it fires when a human merges the held release PR.
  auto-merge:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [release-please]
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - name: Enable auto-merge for the root brepjs release PR only
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Prefer the plural `prs` array (separate-pull-requests: true emits
          # one PR per component); fall back to the singular `pr`.
          PRS_DATA: ${{ needs.release-please.outputs.prs }}
          PR_DATA: ${{ needs.release-please.outputs.pr }}
          GH_REPO: ${{ github.repository }}
        run: |
          prs_json="$PRS_DATA"
          if [ -z "$prs_json" ] || [ "$prs_json" = "null" ]; then
            # Wrap the singular PR object into a one-element array.
            prs_json=$(echo "$PR_DATA" | jq -c 'if . == null or . == "" then [] else [.] end')
          fi

          count=$(echo "$prs_json" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "No release PRs found, skipping"
            exit 0
          fi

          echo "$prs_json" | jq -c '.[]' | while read -r pr; do
            pr_number=$(echo "$pr" | jq -r '.number // empty')
            pr_title=$(echo "$pr" | jq -r '.title // empty')
            if [ -z "$pr_number" ]; then
              echo "PR with no number, skipping"
              continue
            fi
            # Hold brepjs-opencascade (expensive WASM build, manual review) and
            # brepjs-verify / brepjs-viewer (auto-merging their bump PRs loops the
            # release pipeline across linked workspace packages). Only the root
            # brepjs release PR auto-merges.
            case "$pr_title" in
              *brepjs-opencascade* | *brepjs-verify* | *brepjs-viewer* | *brepjs-bim* | *brepjs-sheetmetal*)
                echo "Holding auto-merge for PR #$pr_number ($pr_title) — manual merge"
                continue
                ;;
            esac
            echo "Enabling auto-merge for brepjs PR #$pr_number"
            gh pr merge "$pr_number" --auto --squash --repo "$GH_REPO"
          done

  # brepjs-opencascade is published via publish-opencascade.yml — manual
  # workflow_dispatch (expensive WASM build, publish held).

  publish-brepjs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [release-please]
    # Run when release-please created a brepjs release OR when a human
    # dispatched a republish (recovery from a failed auto-publish).
    # `always() && !cancelled()` lets this evaluate when release-please is
    # skipped (workflow_dispatch path).
    if: |
      always() && !cancelled() &&
      (needs.release-please.outputs.brepjs_release_created == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.republish == true))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run build
      # Authenticates via OIDC trusted publisher (configured for this exact
      # workflow filename on npmjs.com -> brepjs -> Trusted Publisher Mgmt).
      - name: Publish brepjs
        run: npm publish --provenance

  # Auto-publish brepjs-verify by dispatching its own publish workflow rather
  # than inlining `npm publish` here. The npm OIDC trusted publisher for
  # brepjs-verify is bound to the publish-brepjs-verify.yml filename, so the
  # publish must run from that workflow to authenticate. Dispatching also keeps
  # the manual workflow_dispatch path working as the recovery route.
  # Fires on the post-merge release-please run that cuts the brepjs-verify release.
  publish-brepjs-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [release-please]
    if: ${{ needs.release-please.outputs.brepjs_verify_release_created == 'true' }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - name: Dispatch publish-brepjs-verify (real publish)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          # Dispatch against the release tag release-please just created, not the
          # `main` branch: the workflow_dispatch API accepts a tag (immutable) but
          # rejects a raw SHA, and pinning the tag avoids publishing the wrong
          # commit if another push lands on main during the dispatch window.
          GH_REF: ${{ needs.release-please.outputs.brepjs_verify_tag_name }}
        run: gh workflow run publish-brepjs-verify.yml -f dry_run=false --ref "$GH_REF" --repo "$GH_REPO"

  # Auto-publish brepjs-bim by dispatching its own publish workflow (the npm OIDC
  # trusted publisher is bound to the publish-brepjs-bim.yml filename, so the
  # publish must run from that workflow). Fires on the post-merge release-please
  # run that cuts the brepjs-bim release.
  publish-brepjs-bim:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [release-please]
    if: ${{ needs.release-please.outputs.brepjs_bim_release_created == 'true' }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - name: Dispatch publish-brepjs-bim (real publish)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          # Dispatch against the immutable release tag, not main (see verify above).
          GH_REF: ${{ needs.release-please.outputs.brepjs_bim_tag_name }}
        run: gh workflow run publish-brepjs-bim.yml -f dry_run=false --ref "$GH_REF" --repo "$GH_REPO"

  # Auto-publish brepjs-sheetmetal — same pattern as brepjs-bim above.
  publish-brepjs-sheetmetal:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [release-please]
    if: ${{ needs.release-please.outputs.brepjs_sheetmetal_release_created == 'true' }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - name: Dispatch publish-brepjs-sheetmetal (real publish)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ needs.release-please.outputs.brepjs_sheetmetal_tag_name }}
        run: gh workflow run publish-brepjs-sheetmetal.yml -f dry_run=false --ref "$GH_REF" --repo "$GH_REPO"

  # brepjs-viewer is NOT managed by release-please (removed from
  # release-please-config.json): node-workspace was re-pinning brepjs-verify's
  # build-time `brepjs-viewer` devDep to viewer's pending, unpublished version on
  # every verify release, repeatedly breaking the monorepo `npm ci`. Viewer is
  # versioned and published manually via publish-brepjs-viewer.yml dispatch.
