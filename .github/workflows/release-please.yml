name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      republish:
        description: "Republish current main package.json version (skip release-please, run publish-brepjs only)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name == 'push'
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      brepjs_release_created: ${{ steps.release.outputs.release_created }}
      brepjs_opencascade_release_created: ${{ steps.release.outputs['packages/brepjs-opencascade--release_created'] }}
      brepjs_cad_release_created: ${{ steps.release.outputs['packages/brepjs-cad--release_created'] }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
      prs: ${{ steps.release.outputs.prs }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Only auto-merge the root brepjs PR. brepjs-opencascade (expensive WASM
  # build) and brepjs-cad (publish HELD: Andy merges manually) are skipped.
  auto-merge:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [release-please]
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - name: Enable auto-merge for the root brepjs PR only
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Prefer the plural `prs` array (separate-pull-requests: true emits
          # one PR per component); fall back to the singular `pr`.
          PRS_DATA: ${{ needs.release-please.outputs.prs }}
          PR_DATA: ${{ needs.release-please.outputs.pr }}
          GH_REPO: ${{ github.repository }}
        run: |
          prs_json="$PRS_DATA"
          if [ -z "$prs_json" ] || [ "$prs_json" = "null" ]; then
            # Wrap the singular PR object into a one-element array.
            prs_json=$(echo "$PR_DATA" | jq -c 'if . == null or . == "" then [] else [.] end')
          fi

          count=$(echo "$prs_json" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "No release PRs found, skipping"
            exit 0
          fi

          echo "$prs_json" | jq -c '.[]' | while read -r pr; do
            pr_number=$(echo "$pr" | jq -r '.number // empty')
            pr_title=$(echo "$pr" | jq -r '.title // empty')
            if [ -z "$pr_number" ]; then
              echo "PR with no number, skipping"
              continue
            fi
            # Skip brepjs-opencascade (manual review: expensive WASM build) and
            # brepjs-cad (publish HELD: Andy merges manually).
            case "$pr_title" in
              *brepjs-opencascade*)
                echo "Skipping auto-merge for brepjs-opencascade PR #$pr_number (requires manual review)"
                continue
                ;;
              *brepjs-cad*)
                echo "Skipping auto-merge for brepjs-cad PR #$pr_number (publish held, manual merge)"
                continue
                ;;
            esac
            echo "Enabling auto-merge for brepjs PR #$pr_number"
            gh pr merge "$pr_number" --auto --squash --repo "$GH_REPO"
          done

  # brepjs-opencascade is published via publish-opencascade.yml and brepjs-cad
  # via publish-brepjs-cad.yml — both manual workflow_dispatch (publish held).

  publish-brepjs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [release-please]
    # Run when release-please created a brepjs release OR when a human
    # dispatched a republish (recovery from a failed auto-publish).
    # `always() && !cancelled()` lets this evaluate when release-please is
    # skipped (workflow_dispatch path).
    if: |
      always() && !cancelled() &&
      (needs.release-please.outputs.brepjs_release_created == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.republish == true))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run build
      # Authenticates via OIDC trusted publisher (configured for this exact
      # workflow filename on npmjs.com -> brepjs -> Trusted Publisher Mgmt).
      - name: Publish brepjs
        run: npm publish --provenance
