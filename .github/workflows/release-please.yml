name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      republish:
        description: "Republish current main package.json version (skip release-please, run publish-brepjs only)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name == 'push'
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      brepjs_release_created: ${{ steps.release.outputs.release_created }}
      brepjs_opencascade_release_created: ${{ steps.release.outputs['packages/brepjs-opencascade--release_created'] }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Only auto-merge brepjs PRs, NOT brepjs-opencascade (expensive WASM build needs manual review)
  auto-merge:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [release-please]
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - name: Enable auto-merge for brepjs PRs only
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_DATA: ${{ needs.release-please.outputs.pr }}
          GH_REPO: ${{ github.repository }}
        run: |
          pr_number=$(echo "$PR_DATA" | jq -r '.number // empty')
          pr_title=$(echo "$PR_DATA" | jq -r '.title // empty')
          if [ -z "$pr_number" ]; then
            echo "No PR number found, skipping"
            exit 0
          fi
          # Skip brepjs-opencascade PRs — they need manual review due to expensive WASM build
          if [[ "$pr_title" == *"brepjs-opencascade"* ]]; then
            echo "Skipping auto-merge for brepjs-opencascade PR #$pr_number (requires manual review)"
            exit 0
          fi
          echo "Enabling auto-merge for brepjs PR #$pr_number"
          gh pr merge "$pr_number" --auto --squash --repo "$GH_REPO"

  # brepjs-opencascade is published via the dedicated publish-opencascade.yml
  # workflow (manual dispatch) which handles the Docker WASM build.

  publish-brepjs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [release-please]
    # Run when release-please created a brepjs release OR when a human
    # dispatched a republish (recovery from a failed auto-publish).
    # `always() && !cancelled()` lets this evaluate when release-please is
    # skipped (workflow_dispatch path).
    if: |
      always() && !cancelled() &&
      (needs.release-please.outputs.brepjs_release_created == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.republish == true))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run build
      # Authenticates via OIDC trusted publisher (configured for this exact
      # workflow filename on npmjs.com -> brepjs -> Trusted Publisher Mgmt).
      - name: Publish brepjs
        run: npm publish --provenance
