name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      republish:
        description: 'Republish current main package.json version (skip release-please, run publish-brepjs only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Serialize release runs on main. Without this, rapid back-to-back merges (or a
# dependency-bump release loop) spawn concurrent runs that race on the shared
# `autorelease:*` labels — one run removes a label another expects, failing with
# "Label does not exist", which skips the gated publish jobs. Queue, never
# cancel: cancelling mid-publish would leave a tagged-but-unpublished release.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name == 'push'
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      brepjs_release_created: ${{ steps.release.outputs.release_created }}
      brepjs_opencascade_release_created: ${{ steps.release.outputs['packages/brepjs-opencascade--release_created'] }}
      brepjs_cad_release_created: ${{ steps.release.outputs['packages/brepjs-cad--release_created'] }}
      brepjs_cad_tag_name: ${{ steps.release.outputs['packages/brepjs-cad--tag_name'] }}
      brepjs_bim_release_created: ${{ steps.release.outputs['packages/brepjs-bim--release_created'] }}
      brepjs_bim_tag_name: ${{ steps.release.outputs['packages/brepjs-bim--tag_name'] }}
      brepjs_sheetmetal_release_created: ${{ steps.release.outputs['packages/brepjs-sheetmetal--release_created'] }}
      brepjs_sheetmetal_tag_name: ${{ steps.release.outputs['packages/brepjs-sheetmetal--tag_name'] }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
      prs: ${{ steps.release.outputs.prs }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Auto-merge release PRs, but SERIALIZE root brepjs before its leaves.
  #
  # The leaves (brepjs-cad / brepjs-bim / brepjs-sheetmetal) consume root brepjs,
  # and the node-workspace plugin re-pins a leaf's `brepjs` dependency to the
  # version of the *pending* root release. If a leaf were allowed to merge while
  # the root brepjs release PR is still open, main would carry a leaf pinned to a
  # brepjs version that isn't on npm yet — `npm install` then fails with ETARGET
  # and every Vercel deploy breaks (the 2026-06-25 outage). Merging a leaf early
  # also conflicts the still-open root PR on the shared .release-please-manifest.
  #
  # Fix: while the root brepjs release PR is open, arm auto-merge ONLY on it and
  # HOLD every leaf. Once root merges (and bumps main + publishes), the next
  # release-please run regenerates each leaf PR with a now-valid pin against an
  # up-to-date main, and this job — which runs on every push — arms their
  # auto-merge then. brepjs-opencascade stays permanently held (expensive WASM
  # build, manual review). Auto-PUBLISH fires when each release PR merges.
  auto-merge:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [release-please]
    if: ${{ needs.release-please.result == 'success' }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - name: Auto-merge release PRs (root brepjs before leaves)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          # The root "." component's release branch (component name "brepjs").
          # Leaf branches carry a `-<pkg>` suffix, so this matches root exactly.
          ROOT_BRANCH: release-please--branches--main--components--brepjs
        run: |
          # Query the live set of open release PRs (release-please labels every
          # one `autorelease: pending`) rather than trusting the action outputs,
          # so a held leaf is picked up on whichever later run unblocks it.
          prs=$(gh pr list --state open --label 'autorelease: pending' \
            --repo "$GH_REPO" --json number,title,headRefName)

          count=$(echo "$prs" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "No open release PRs, nothing to do"
            exit 0
          fi

          root_open=$(echo "$prs" | jq --arg b "$ROOT_BRANCH" \
            '[.[] | select(.headRefName == $b)] | length')

          echo "$prs" | jq -c '.[]' | while read -r pr; do
            number=$(echo "$pr" | jq -r '.number')
            title=$(echo "$pr" | jq -r '.title')
            branch=$(echo "$pr" | jq -r '.headRefName')

            case "$branch" in
              *--components--brepjs-opencascade)
                echo "HOLD #$number ($title) — opencascade is manual (expensive WASM build)"
                continue
                ;;
              "$ROOT_BRANCH")
                echo "MERGE #$number ($title) — root brepjs release goes first"
                gh pr merge "$number" --auto --squash --repo "$GH_REPO"
                continue
                ;;
            esac

            # Any other component is a leaf. Hold it while the root brepjs
            # release PR is open; it is regenerated with a valid pin and
            # auto-merged on the next run, after root merges + publishes.
            if [ "$root_open" -gt 0 ]; then
              echo "HOLD #$number ($title) — waiting for root brepjs release to merge first"
            else
              echo "MERGE #$number ($title) — no root brepjs release pending"
              gh pr merge "$number" --auto --squash --repo "$GH_REPO"
            fi
          done

  # brepjs-opencascade is published via publish-opencascade.yml — manual
  # workflow_dispatch (expensive WASM build, publish held).

  publish-brepjs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [release-please]
    # Run when release-please created a brepjs release OR when a human
    # dispatched a republish (recovery from a failed auto-publish).
    # `always() && !cancelled()` lets this evaluate when release-please is
    # skipped (workflow_dispatch path).
    if: |
      always() && !cancelled() &&
      (needs.release-please.outputs.brepjs_release_created == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.republish == true))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run build
      # Authenticates via OIDC trusted publisher (configured for this exact
      # workflow filename on npmjs.com -> brepjs -> Trusted Publisher Mgmt).
      - name: Publish brepjs
        run: npm publish --provenance

  # Auto-publish brepjs-cad by dispatching its own publish workflow rather
  # than inlining `npm publish` here. The npm OIDC trusted publisher for
  # brepjs-cad is bound to the publish-brepjs-cad.yml filename, so the
  # publish must run from that workflow to authenticate. Dispatching also keeps
  # the manual workflow_dispatch path working as the recovery route.
  # Fires on the post-merge release-please run that cuts the brepjs-cad release.
  publish-brepjs-cad:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [release-please]
    if: ${{ needs.release-please.outputs.brepjs_cad_release_created == 'true' }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - name: Dispatch publish-brepjs-cad (real publish)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          # Dispatch against the release tag release-please just created, not the
          # `main` branch: the workflow_dispatch API accepts a tag (immutable) but
          # rejects a raw SHA, and pinning the tag avoids publishing the wrong
          # commit if another push lands on main during the dispatch window.
          GH_REF: ${{ needs.release-please.outputs.brepjs_cad_tag_name }}
        run: gh workflow run publish-brepjs-cad.yml -f dry_run=false --ref "$GH_REF" --repo "$GH_REPO"

  # Auto-publish brepjs-bim by dispatching its own publish workflow (the npm OIDC
  # trusted publisher is bound to the publish-brepjs-bim.yml filename, so the
  # publish must run from that workflow). Fires on the post-merge release-please
  # run that cuts the brepjs-bim release.
  publish-brepjs-bim:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [release-please]
    if: ${{ needs.release-please.outputs.brepjs_bim_release_created == 'true' }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - name: Dispatch publish-brepjs-bim (real publish)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          # Dispatch against the immutable release tag, not main (see verify above).
          GH_REF: ${{ needs.release-please.outputs.brepjs_bim_tag_name }}
        run: gh workflow run publish-brepjs-bim.yml -f dry_run=false --ref "$GH_REF" --repo "$GH_REPO"

  # Auto-publish brepjs-sheetmetal — same pattern as brepjs-bim above.
  publish-brepjs-sheetmetal:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [release-please]
    if: ${{ needs.release-please.outputs.brepjs_sheetmetal_release_created == 'true' }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - name: Dispatch publish-brepjs-sheetmetal (real publish)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ needs.release-please.outputs.brepjs_sheetmetal_tag_name }}
        run: gh workflow run publish-brepjs-sheetmetal.yml -f dry_run=false --ref "$GH_REF" --repo "$GH_REPO"

  # brepjs-viewer is NOT managed by release-please (removed from
  # release-please-config.json): node-workspace was re-pinning brepjs-cad's
  # build-time `brepjs-viewer` devDep to viewer's pending, unpublished version on
  # every verify release, repeatedly breaking the monorepo `npm ci`. Viewer is
  # versioned and published manually via publish-brepjs-viewer.yml dispatch.
