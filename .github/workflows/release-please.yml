name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      brepjs_release_created: ${{ steps.release.outputs.release_created }}
      brepjs_opencascade_release_created: ${{ steps.release.outputs['packages/brepjs-opencascade--release_created'] }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Only auto-merge brepjs PRs, NOT brepjs-opencascade (expensive WASM build needs manual review)
  auto-merge:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [release-please]
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.BREPJS_BOT_APP_ID }}
          private-key: ${{ secrets.BREPJS_BOT_PRIVATE_KEY }}
      - name: Enable auto-merge for brepjs PRs only
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_DATA: ${{ needs.release-please.outputs.pr }}
          GH_REPO: ${{ github.repository }}
        run: |
          pr_number=$(echo "$PR_DATA" | jq -r '.number // empty')
          pr_title=$(echo "$PR_DATA" | jq -r '.title // empty')
          if [ -z "$pr_number" ]; then
            echo "No PR number found, skipping"
            exit 0
          fi
          # Skip brepjs-opencascade PRs — they need manual review due to expensive WASM build
          if [[ "$pr_title" == *"brepjs-opencascade"* ]]; then
            echo "Skipping auto-merge for brepjs-opencascade PR #$pr_number (requires manual review)"
            exit 0
          fi
          echo "Enabling auto-merge for brepjs PR #$pr_number"
          gh pr merge "$pr_number" --auto --squash --repo "$GH_REPO"

  # brepjs-opencascade is published via the dedicated publish-opencascade.yml
  # workflow (manual dispatch) which handles the Docker WASM build.

  publish-brepjs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [release-please]
    if: ${{ needs.release-please.outputs.brepjs_release_created == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish brepjs
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
