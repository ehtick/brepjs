name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      playground: ${{ steps.filter.outputs.playground }}
      voxel: ${{ steps.filter.outputs.voxel }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Release-please PRs only touch CHANGELOG.md, package.json versions,
      # and .release-please-manifest.json — no code changes to validate.
      - name: Skip release-please PRs
        id: release-please
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == release-please--* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        if: steps.release-please.outputs.skip != 'true'
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'packages/**'
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vitest*.config.ts'
              - 'vite.config.ts'
              - 'eslint.config.*'
              - 'knip.config.*'
              - '.prettierrc*'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            playground:
              - 'src/**'
              - 'packages/**'
              - 'apps/playground/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            voxel:
              - 'packages/brepjs-voxel-wasm/**'
              - '.github/workflows/ci.yml'

  typecheck:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: npm run typecheck

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: npm run lint
      - run: npm run format:check

  quality:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: npm run check:boundaries
      - run: npm run check:patterns
      - run: npm run knip

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: npm run build
      - run: npm run docs:api
      # Fail if docs/function-lookup.md is stale (regenerate + commit to fix).
      # Prettier-normalize first: the generator emits compact tables, but the
      # *.md lint-staged rule reformats the committed file to aligned columns.
      - run: npm run docs:generate-lookup
      - run: npx prettier --write docs/function-lookup.md
      - run: git diff --exit-code docs/function-lookup.md

  playground-build:
    # Mirrors what Vercel runs (`npm run build --workspace=apps/playground`).
    # Catches type-resolution and bundler regressions in the playground
    # before they break Preview deploys — e.g. the duplicate `@types/three`
    # install in #963 that broke `tsc -b` only inside apps/playground.
    needs: changes
    if: needs.changes.outputs.playground == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      # The playground resolves `brepjs` (and the brepjs-bim / brepjs-sheetmetal
      # domain packages its worker imports) via package exports → `dist/`. Build
      # the libraries first so `tsc -b` and `vite build` see real type/runtime files.
      - run: npm run build
      - run: npm run build --workspace=brepjs-bim
      - run: npm run build --workspace=brepjs-sheetmetal
      - run: npm run build --workspace=apps/playground

  packages-viewer:
    # Shared React/R3F renderer extracted from the playground; gated on its own
    # since the playground (and brepjs-cad) now depend on it.
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: npm run typecheck --workspace=brepjs-viewer
      - run: npm run lint --workspace=brepjs-viewer
      - run: npm run test --workspace=brepjs-viewer
      - run: npm run build --workspace=brepjs-viewer

  packages-verify:
    # brepjs-cad skill runtime (verify CLI + WASM viewer). Build root brepjs and
    # brepjs-viewer dist first so the package typecheck/viewer build resolve their
    # types (brepjs-viewer is a runtime dep, not externalized). The setup
    # composite restores the OCCT WASM the viewer build copies.
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: npm run build
      - run: npm run build --workspace=brepjs-viewer
      - run: npm run typecheck --workspace=brepjs-cad
      - run: npm run lint --workspace=brepjs-cad
      - run: npm run test --workspace=brepjs-cad
      - run: npm run build --workspace=brepjs-cad
      # Deterministic eval: replay skills/implement/examples through runPart, gate on volume/area/validity.
      - run: npm run eval --workspace=brepjs-cad
      # Smoke: run the BUILT cli under plain node on a .ts part — catches the bin/TS-load
      # failures that only surface for installed users (tsx/vitest hide them in-repo).
      - run: npm run smoke --workspace=brepjs-cad
      # Standalone smoke: pack the tarball, install it into a clean project with NO brepjs,
      # and run the installed bin — proves bundling + the bundled-fallback resolve hook for a
      # true standalone user (a bundling/fallback break is invisible to the in-repo smoke).
      - run: npm run smoke:standalone --workspace=brepjs-cad

  packages-sheetmetal:
    # Experimental sheet-metal domain satellite. Build root brepjs first so the
    # package typecheck/build resolve `brepjs` via package exports → dist/; tests
    # resolve `brepjs` to source through the vitest alias and need the OCCT WASM
    # the setup composite restores.
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: npm run build
      - run: npm run typecheck --workspace=brepjs-sheetmetal
      - run: npm run lint --workspace=brepjs-sheetmetal
      - run: npm run test --workspace=brepjs-sheetmetal
      - run: npm run build --workspace=brepjs-sheetmetal

  packages-bim:
    # Experimental BIM (IFC4) domain satellite. Build root brepjs first so the
    # package typecheck/build resolve `brepjs` via package exports → dist/; tests
    # resolve `brepjs` to source through the vitest alias and need the OCCT WASM
    # the setup composite restores (web-ifc is a devDep, installed by npm ci).
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: npm run build
      - run: npm run typecheck --workspace=brepjs-bim
      - run: npm run lint --workspace=brepjs-bim
      - run: npm run test --workspace=brepjs-bim
      - run: npm run build --workspace=brepjs-bim

  voxel-wasm-rust:
    # The brepjs-voxel-wasm crate's correctness — the BVH/FWN/narrow-band/sparse
    # parity gates (incl. the seam-free tiled-vs-dense contour proof) — lives in
    # cargo tests, which otherwise run nowhere in CI: the committed pkg/ wasm is
    # all the vitest suite drives. Run cargo test + clippy as a gate. (Not a
    # rebuild-and-diff of pkg/ — wasm-opt output varies by version, so it would
    # flake; this gates the source-level correctness proof.)
    needs: changes
    if: needs.changes.outputs.voxel == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/brepjs-voxel-wasm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Use latest stable Rust + clippy
        run: rustup update stable && rustup default stable && rustup component add clippy
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Sharded across runners so each fork processes ~1/4 of the suite. OCCT WASM
    # linear memory grows monotonically across tests; a long single-runner run
    # (173 files / 4 forks × 6 GB heap) over-commits the 16 GB runner into swap,
    # stalling a fork until the 90s per-test timeout trips (#1102). Short shards
    # exit before accumulation reaches that threshold. Coverage runs separately
    # (the `coverage` job) — vitest --merge-reports can't recombine coverage
    # across shards in this workspace+v8 setup.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: npm run test:ci -- --shard=${{ matrix.shard }}/4 --reporter=default --reporter=github-actions

  coverage:
    # Coverage thresholds run on main only — informational, not a PR gate (kept
    # out of ci-pass). The full instrumented suite can't shard (see `test`), so
    # it runs on one runner with maxWorkers=2 and a raised per-test timeout to
    # ride out any residual swap stall rather than red on the 90s default.
    # continue-on-error so an informational threshold dip doesn't flip the whole
    # CI run to failure — that conclusion gates the Deploy API Docs workflow_run.
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: npm run test:full -- --reporter=default --maxWorkers=2 --testTimeout=180000

  size:
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pull-requests: write
    steps:
      # size-limit-action manages its own checkout/build cycle — cannot use composite action
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache
        with:
          path: node_modules
          key: node-24-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-24-${{ runner.os }}-
      - if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: bash scripts/ensure-wasm.sh
      - uses: andresz1/size-limit-action@94bc357df29c36c8f8d50ea497c3e225c3c95d1d # v1.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_script: 'build'

  benchmark:
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - name: Clear stale Vite transform cache
        run: rm -rf node_modules/.vite
      - name: Run benchmark on PR branch
        run: NO_COLOR=1 npx vitest run benchmarks/regression.bench.test.ts --config vitest.bench.config.ts --reporter=verbose 2>&1 | tee /tmp/bench-pr.txt
      - name: Extract PR benchmark results
        run: sed -n '/--- BENCHMARK RESULTS JSON ---/,/--- END BENCHMARK RESULTS ---/p' /tmp/bench-pr.txt | sed '1d;$d' > /tmp/pr-results.json
      - name: Checkout main branch
        run: git fetch origin main && git checkout origin/main
      # continue-on-error so a broken main baseline (e.g. a dependency/lockfile
      # sync issue) can't deadlock every PR through the required ci-pass gate —
      # including the very PR that fixes main. If the baseline won't install we
      # skip the comparison rather than failing; the PR's own benchmark still runs.
      - name: Install main branch dependencies
        id: main-install
        continue-on-error: true
        run: npm ci --ignore-scripts && bash scripts/ensure-wasm.sh
      - name: Run benchmark on main branch
        if: steps.main-install.outcome == 'success'
        run: |
          if [ -f benchmarks/regression.bench.test.ts ]; then
            NO_COLOR=1 npx vitest run benchmarks/regression.bench.test.ts --config vitest.bench.config.ts --reporter=verbose 2>&1 | tee /tmp/bench-main.txt
            sed -n '/--- BENCHMARK RESULTS JSON ---/,/--- END BENCHMARK RESULTS ---/p' /tmp/bench-main.txt | sed '1d;$d' > /tmp/main-results.json
          else
            echo "[]" > /tmp/main-results.json
            echo "Benchmark file not found on main — skipping baseline"
          fi
      - name: Skip baseline if main install failed
        if: steps.main-install.outcome != 'success'
        run: |
          echo "[]" > /tmp/main-results.json
          echo "::warning::main branch dependency install failed — skipping benchmark baseline (no comparison this run)"
      - name: Compare results and post PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { readFileSync } = await import('fs');
            const prRaw = readFileSync('/tmp/pr-results.json', 'utf8').trim();
            const mainRaw = readFileSync('/tmp/main-results.json', 'utf8').trim();
            const prResults = prRaw ? JSON.parse(prRaw) : [];
            const mainResults = mainRaw ? JSON.parse(mainRaw) : [];

            const mainByName = {};
            for (const b of mainResults) {
              mainByName[b.name] = b;
            }

            // 25% threshold: shared CI runners (different machines for main
            // vs PR sides) show ~9-15% run-to-run variance even on
            // semantically identical code. Tightening below 25% produces
            // more false positives than real regressions caught.
            const REGRESSION_THRESHOLD_PCT = 25;

            let hasRegression = false;
            const rows = [];

            for (const pr of prResults) {
              const main = mainByName[pr.name];
              if (!main) {
                rows.push(`| ${pr.name} | — | ${pr.median.toFixed(2)} ms | *new* | ⚪ |`);
                continue;
              }

              const pctChange = ((pr.median - main.median) / main.median) * 100;
              let icon;
              if (pctChange > REGRESSION_THRESHOLD_PCT) {
                icon = '🔴';
                hasRegression = true;
              } else if (pctChange < -REGRESSION_THRESHOLD_PCT) {
                icon = '🟢';
              } else {
                icon = '⚪';
              }

              rows.push(`| ${pr.name} | ${main.median.toFixed(2)} ms | ${pr.median.toFixed(2)} ms | ${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(1)}% | ${icon} |`);
            }

            const marker = '<!-- brepjs-benchmark-results -->';
            const body = [
              marker,
              '## Benchmark Results',
              '',
              '| Benchmark | main | PR | Change | |',
              '|-----------|------|----|---------|-|',
              ...rows,
              '',
              hasRegression ? `**🔴 Regression detected:** one or more benchmarks regressed >${REGRESSION_THRESHOLD_PCT}%` : 'All benchmarks within tolerance.',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            if (hasRegression) {
              core.setFailed(`Benchmark regression detected: one or more benchmarks regressed >${REGRESSION_THRESHOLD_PCT}%`);
            }

  ci-pass:
    if: always()
    needs:
      [
        changes,
        typecheck,
        lint,
        quality,
        build,
        playground-build,
        packages-viewer,
        packages-verify,
        packages-sheetmetal,
        packages-bim,
        voxel-wasm-rust,
        test,
        size,
        benchmark,
      ]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Fail if any upstream job failed or was cancelled
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: All CI jobs passed
        run: echo "All CI jobs passed"
