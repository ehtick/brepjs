name: Publish brepjs-opencascade

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, skip publish)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: read

jobs:
  build-wasm:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build single (no exceptions)
        working-directory: packages/brepjs-opencascade/build-config
        run: |
          docker run -i --rm -v "$(pwd)":/src ghcr.io/andymai/opencascade.js:wasm-exceptions custom_build_single.yml
          mv brepjs_single* ../src/

      # Threaded and exceptions builds are disabled — the wasm-exceptions Docker
      # image lacks the pthread toolchain needed for threaded builds, and the
      # exceptions build has compilation issues. Gridfinity uses single only.
      # TODO: re-enable when Docker image supports all build variants.

      - name: Optimize WASM binaries
        working-directory: packages/brepjs-opencascade/src
        run: |
          npm install -g binaryen
          for f in *.wasm; do
            echo "Optimizing $f..."
            wasm-opt -O4 --strip-debug --strip-producers "$f" -o "$f"
          done

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: opencascade-wasm
          path: packages/brepjs-opencascade/src/

  publish:
    needs: build-wasm
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download WASM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: opencascade-wasm
          path: packages/brepjs-opencascade/src/

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        working-directory: packages/brepjs-opencascade
        run: npm publish --provenance --access public
