name: Publish brepjs-opencascade

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, skip publish)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: read

jobs:
  build-wasm:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build WASM (OCCT V8 + emsdk 5)
        working-directory: packages/brepjs-opencascade/build-config
        run: |
          docker pull ghcr.io/andymai/opencascade.js:v8
          docker run -i --rm -v "$(pwd)":/src ghcr.io/andymai/opencascade.js:v8 brepjs.yml
          mv brepjs_single* ../src/

      # wasm-opt is already run inside the Docker container by buildFromYaml.py
      # with --enable-exception-handling. No need to run it again in CI.

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opencascade-wasm
          path: packages/brepjs-opencascade/src/

  publish:
    needs: build-wasm
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download WASM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: opencascade-wasm
          path: packages/brepjs-opencascade/src/

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        working-directory: packages/brepjs-opencascade
        run: npm publish --provenance --access public
