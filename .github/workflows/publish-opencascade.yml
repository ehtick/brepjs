name: Publish brepjs-opencascade

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, skip publish)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: read

jobs:
  build-wasm:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build WASM (OCCT V8 + emsdk 5)
        working-directory: packages/brepjs-opencascade/build-config
        run: |
          docker pull ghcr.io/andymai/opencascade.js:v8
          docker run -i --rm -v "$(pwd)":/src ghcr.io/andymai/opencascade.js:v8 brepjs.yml
          mv brepjs_single* ../src/

      # wasm-opt is already run inside the Docker container by buildFromYaml.py
      # with --enable-exception-handling. No need to run it again in CI.

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: opencascade-wasm
          path: packages/brepjs-opencascade/src/

  publish:
    needs: build-wasm
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download WASM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: opencascade-wasm
          path: packages/brepjs-opencascade/src/

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        working-directory: packages/brepjs-opencascade
        run: npm publish --provenance --access public
