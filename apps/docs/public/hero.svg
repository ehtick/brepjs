<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="hg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
    </filter>
  </defs>
  <!-- Isometric box with cylindrical hole and filleted top edges -->
  <g filter="url(#soft)">
    <!-- top face (parallelogram) -->
    <path d="M80 90 L240 90 L280 130 L120 130 Z" fill="url(#hg)" stroke="#0b1f4a" stroke-width="2" stroke-linejoin="round"/>
    <!-- right face -->
    <path d="M240 90 L280 130 L280 240 L240 200 Z" fill="url(#hg2)" stroke="#0b1f4a" stroke-width="2" stroke-linejoin="round"/>
    <!-- front face -->
    <path d="M120 130 L280 130 L280 240 L120 240 Z" fill="url(#hg)" opacity="0.9" stroke="#0b1f4a" stroke-width="2" stroke-linejoin="round"/>
    <!-- cylindrical hole top ellipse -->
    <ellipse cx="200" cy="110" rx="22" ry="9" fill="#0b1f4a" opacity="0.55"/>
    <!-- hole shading inside front face -->
    <ellipse cx="200" cy="170" rx="14" ry="22" fill="#0b1f4a" opacity="0.35"/>
    <!-- highlight on top edge -->
    <path d="M85 92 L235 92" stroke="#dbeafe" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
